# Fork-only workflow: builds portable Windows and Linux packages and publishes
# them as GitHub Release assets on this fork. Build steps mirror nightly.yml
# (Windows) and ubuntu.yml (Linux) from upstream.

name: Fork Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (defaults to fork-<date>-<short sha>)
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: fork-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Compute release tag
        id: meta
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag="fork-$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; assets will be added to it."
            exit 0
          fi
          gh release create "$TAG" -R "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "LichtFeld Studio fork build $TAG" \
            --notes "Automated fork build of commit $GITHUB_SHA. Portable packages for Windows x64 and Linux x64 (CUDA 12.8)."

  build-linux:
    needs: create-release
    runs-on: ubuntu-24.04
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/../vcpkg
      CC: gcc-14
      CXX: g++-14
      VCPKG_BUILD_TYPE: release
      VCPKG_FORCE_SYSTEM_BINARIES: 1
      CMAKE_MAKE_PROGRAM: /usr/bin/ninja
      CUDA_PATH: /usr/local/cuda
      CUDNN_ROOT_DIR: /usr/local/cuda

    steps:
      - name: Install Git
        run: |
          apt-get update
          apt-get install -y git

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Free disk space
        run: |
          apt-get clean
          rm -rf /var/lib/apt/lists/*
          # Host paths (may not exist in container)
          rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache /usr/local/lib/android /opt/az
          # CUDA extras - samples, docs, tools we don't need
          rm -rf /usr/local/cuda/nsight* /usr/local/cuda/compute-sanitizer
          rm -rf /usr/local/cuda/extras /usr/local/cuda/tools
          rm -rf /usr/local/cuda/doc
          # Remove large static libs but keep ones needed for build
          find /usr/local/cuda/targets/x86_64-linux/lib -name '*.a' \
            ! -name 'libcudart_static.a' \
            ! -name 'libcudadevrt.a' \
            ! -name 'libnvjpeg_static.a' \
            ! -name 'libnvjpeg2k_static.a' \
            ! -name 'libculibos.a' \
            -delete 2>/dev/null || true
          df -h

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y ca-certificates gpg wget

          # CMake 3.30+ from Kitware
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | gpg --dearmor - | tee /usr/share/keyrings/kitware-archive-keyring.gpg >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main' | tee /etc/apt/sources.list.d/kitware.list >/dev/null

          # GitHub CLI for release asset upload
          mkdir -p -m 755 /etc/apt/keyrings
          wget -qO- https://cli.github.com/packages/githubcli-archive-keyring.gpg | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg >/dev/null
          chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list >/dev/null

          apt-get update

          apt-get install -y git curl unzip cmake gcc-14 g++-14 ccache ninja-build gh \
            zip tar pkg-config python3 python3-dev libxinerama-dev libxcursor-dev xorg-dev libglu1-mesa-dev \
            libwayland-dev libxkbcommon-dev libegl-dev libdecor-0-dev libibus-1.0-dev libdbus-1-dev \
            libsystemd-dev libgtk-3-dev \
            nasm autoconf autoconf-archive automake libtool

          update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
                              --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Ensure cuDNN is available
        shell: bash
        run: |
          set -euo pipefail
          # /usr/local/cuda and its lib64 are symlinks, so find must follow them (-L).
          if [ -f /usr/local/cuda/include/cudnn.h ] && \
             find -L /usr/local/cuda /usr/lib /usr/lib/x86_64-linux-gnu -name 'libcudnn.so.9*' -print -quit | grep -q .; then
            echo "Using preinstalled cuDNN:"
            find -L /usr/local/cuda /usr/lib /usr/lib/x86_64-linux-gnu -name 'libcudnn.so.9*' -print | head
            exit 0
          fi

          echo "cuDNN 9 was not provided by the runner image; installing cuDNN 9.5.0 for CUDA 12 from NVIDIA redist."
          CUDNN_URL="https://developer.download.nvidia.com/compute/cudnn/redist/cudnn/linux-x86_64/cudnn-linux-x86_64-9.5.0.50_cuda12-archive.tar.xz"
          mkdir -p /tmp/cudnn-redist
          curl -L --retry 5 --retry-delay 10 "$CUDNN_URL" -o /tmp/cudnn.tar.xz
          tar -xf /tmp/cudnn.tar.xz --strip-components=1 -C /tmp/cudnn-redist --exclude='*.a'
          rm -f /tmp/cudnn.tar.xz
          cp -a /tmp/cudnn-redist/include/. /usr/local/cuda/include/
          cp -a /tmp/cudnn-redist/lib/. /usr/local/cuda/lib64/
          rm -rf /tmp/cudnn-redist
          ldconfig
          test -f /usr/local/cuda/include/cudnn.h
          if ! find -L /usr/local/cuda/lib64 -name 'libcudnn.so.9*' -print -quit | grep -q .; then
            echo "cuDNN 9 library was not found after setup." >&2
            exit 1
          fi
          find -L /usr/local/cuda/lib64 -name 'libcudnn.so.9*' -print | head
          df -h

      - name: Cache vcpkg tool
        id: cache-vcpkg-tool
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}
          key: vcpkg-tool-${{ runner.os }}-2026-02-21
          restore-keys: vcpkg-tool-${{ runner.os }}-

      - name: Setup vcpkg
        if: steps.cache-vcpkg-tool.outputs.cache-hit != 'true'
        run: |
          cd ..
          git clone https://github.com/microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Configure vcpkg triplet
        run: |
          cat >> $VCPKG_ROOT/triplets/x64-linux.cmake << 'EOF'
          set(VCPKG_BUILD_TYPE release)
          set(VCPKG_MAX_CONCURRENCY 2)
          EOF

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/ccache
          key: ccache-${{ runner.os }}-Release-${{ github.run_id }}
          restore-keys: ccache-${{ runner.os }}-Release-

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/vcpkg/archives
          key: vcpkg-pkgs-${{ runner.os }}-linux-gui-prebuilt-ort-v1-${{ hashFiles('**/vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: vcpkg-pkgs-${{ runner.os }}-linux-gui-prebuilt-ort-

      - name: Configure
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc \
            -DBUILD_PORTABLE=ON \
            -DBUILD_PYTHON_STUBS=OFF \
            -DLFS_DEV_IMPORT_SOURCE_PYTHON=OFF \
            -DLFS_DEV_IMPORT_SOURCE_RESOURCES=OFF \
            -DCUDA_DEVICE_DEBUG=OFF \
            -DCMAKE_C_FLAGS="-pipe" \
            -DCMAKE_CXX_FLAGS="-pipe"

      - name: Clean vcpkg buildtrees
        run: |
          rm -rf build/vcpkg_installed/vcpkg/blds build/vcpkg_installed/vcpkg/pkgs
          rm -rf "$VCPKG_ROOT"/buildtrees "$VCPKG_ROOT"/downloads "$VCPKG_ROOT"/packages
          df -h

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Package
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          set -euo pipefail
          cmake --install build --prefix dist
          PKG="LichtFeld-Studio-linux-x64-${TAG}.tar.gz"
          tar -czf "$PKG" -C dist .
          sha256sum "$PKG" > "$PKG.sha256"
          ls -lh "$PKG"
          df -h

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          set -euo pipefail
          PKG="LichtFeld-Studio-linux-x64-${TAG}.tar.gz"
          gh release upload "$TAG" "$PKG" "$PKG.sha256" -R "$GITHUB_REPOSITORY" --clobber

  build-windows:
    needs: create-release
    runs-on: windows-2022
    env:
      VCPKG_ROOT: ${{ github.workspace }}\..\vcpkg
      VCPKG_BUILD_TYPE: release
      CUDA_PATH: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v12.8"
      CUDNN_ROOT_DIR: "C:\\Program Files\\NVIDIA GPU Computing Toolkit\\CUDA\\v12.8"
      BUILD_DIR: b

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install CUDA 12.8
        run: |
          cd ..
          Invoke-WebRequest https://developer.download.nvidia.com/compute/cuda/12.8.0/local_installers/cuda_12.8.0_571.96_windows.exe -OutFile cuda.exe -Verbose
          Start-Process -FilePath .\cuda.exe -ArgumentList "-y -s -accepteula -toolkit -override -noDisplayDriver" -Wait

      - name: Set CUDA environment
        run: |
          echo "CUDA_PATH=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CUDA_PATH_V12_8=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CUDNN_ROOT_DIR=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8\libnvvp" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Ensure cuDNN is available
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $cudaPath = 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8'
          $include = Join-Path $cudaPath 'include\cudnn.h'
          $libs = @(Get-ChildItem (Join-Path $cudaPath 'lib\x64') -Filter 'cudnn*.lib' -ErrorAction SilentlyContinue)
          $dlls = @(Get-ChildItem (Join-Path $cudaPath 'bin') -Filter 'cudnn*64_9.dll' -ErrorAction SilentlyContinue)
          if ((Test-Path $include) -and $libs.Count -gt 0 -and $dlls.Count -gt 0) {
            Write-Host "Using provided cuDNN:"
            $libs | Select-Object -First 5 | ForEach-Object { Write-Host $_.FullName }
            $dlls | Select-Object -First 5 | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "cuDNN 9 was not provided by the runner image; installing cuDNN 9.5.0 for CUDA 12 from NVIDIA redist."
            $url = 'https://developer.download.nvidia.com/compute/cudnn/redist/cudnn/windows-x86_64/cudnn-windows-x86_64-9.5.0.50_cuda12-archive.zip'
            Invoke-WebRequest $url -OutFile cudnn.zip -Verbose
            Expand-Archive cudnn.zip -DestinationPath cudnn
            $root = Get-ChildItem cudnn -Directory | Select-Object -First 1
            if (-not $root) {
              throw "Could not find extracted cuDNN archive root."
            }
            Copy-Item "$($root.FullName)\bin\*" (Join-Path $cudaPath 'bin') -Recurse -Force
            Copy-Item "$($root.FullName)\include\*" (Join-Path $cudaPath 'include') -Recurse -Force
            Copy-Item "$($root.FullName)\lib\x64\*" (Join-Path $cudaPath 'lib\x64') -Recurse -Force
          }
          if (-not (Test-Path $include)) {
            throw "cuDNN header was not found after setup: $include"
          }
          $libs = @(Get-ChildItem (Join-Path $cudaPath 'lib\x64') -Filter 'cudnn*.lib' -ErrorAction SilentlyContinue)
          $dlls = @(Get-ChildItem (Join-Path $cudaPath 'bin') -Filter 'cudnn*64_9.dll' -ErrorAction SilentlyContinue)
          if ($libs.Count -eq 0 -or $dlls.Count -eq 0) {
            throw "cuDNN 9 library or DLL was not found after setup."
          }
          "CUDNN_ROOT_DIR=$cudaPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache vcpkg tool
        id: cache-vcpkg-tool
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}
          key: vcpkg-tool-${{ runner.os }}-2026-03-12
          restore-keys: vcpkg-tool-${{ runner.os }}-

      - name: Setup vcpkg
        if: steps.cache-vcpkg-tool.outputs.cache-hit != 'true'
        run: |
          cd ..
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg_installed
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}/vcpkg_installed
          key: vcpkg-installed-${{ runner.os }}-prebuilt-ort-v1-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: vcpkg-installed-${{ runner.os }}-prebuilt-ort-v1-

      - name: Configure
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $buildDir = $env:BUILD_DIR
          $cmakeArgs = "-B $buildDir -S . -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_PORTABLE=ON -DBUILD_PYTHON_STUBS=OFF"
          $retryablePatterns = @(
            'status code 5\d\d',
            'timed out',
            'timeout',
            'connection reset',
            'failed to connect',
            'temporarily unavailable',
            'tls',
            'ssl'
          )

          for ($attempt = 1; $attempt -le 3; $attempt++) {
            Write-Host "Configure attempt $attempt/3"
            cmd /c "call `"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat`" && cmake $cmakeArgs"

            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            $shouldRetry = $false
            $manifestLog = Join-Path $buildDir 'vcpkg-manifest-install.log'
            if (Test-Path $manifestLog) {
              foreach ($pattern in $retryablePatterns) {
                if (Select-String -Path $manifestLog -Pattern $pattern -Quiet) {
                  $shouldRetry = $true
                  break
                }
              }
            }

            if (-not $shouldRetry -or $attempt -eq 3) {
              exit $LASTEXITCODE
            }

            Write-Warning "Retryable configure failure detected, cleaning build tree before retry."
            if (Test-Path $buildDir) {
              Remove-Item -Recurse -Force $buildDir
            }
            Start-Sleep -Seconds (15 * $attempt)
          }

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build %BUILD_DIR% -j %NUMBER_OF_PROCESSORS%

      - name: Dump failure diagnostics
        if: failure()
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $buildDir = $env:BUILD_DIR
          $paths = @(
            "$buildDir\vcpkg-manifest-install.log",
            "$buildDir\vcpkg_installed\vcpkg\issue_body.md",
            "$buildDir\CMakeFiles\CMakeConfigureLog.yaml",
            "$buildDir\CMakeFiles\CMakeError.log",
            "$buildDir\CMakeFiles\CMakeOutput.log",
            "$buildDir\CMakeCache.txt"
          )

          foreach ($path in $paths) {
            if (Test-Path $path) {
              Write-Host "::group::$path"
              Get-Content $path -Tail 400
              Write-Host "::endgroup::"
            }
          }

      - name: Package
        shell: pwsh
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          $ErrorActionPreference = 'Stop'
          $packageName = "LichtFeld-Studio-windows-x64-$($env:TAG).zip"
          cmake --install $env:BUILD_DIR --prefix dist
          Compress-Archive -Path dist\* -DestinationPath $packageName
          $checksum = (Get-FileHash -Algorithm SHA256 -Path $packageName).Hash.ToLowerInvariant()
          Set-Content -Path "$packageName.sha256" -Value "$checksum  $packageName" -Encoding ascii
          Get-Item $packageName | Format-List Name, Length

      - name: Upload release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          $ErrorActionPreference = 'Stop'
          $packageName = "LichtFeld-Studio-windows-x64-$($env:TAG).zip"
          gh release upload $env:TAG $packageName "$packageName.sha256" -R $env:GITHUB_REPOSITORY --clobber
